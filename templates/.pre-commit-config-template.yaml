# .pre-commit-config.yaml — optional, aligned with the tool config in pyproject.toml.
# A minimal script doesn't need this; add it when the project gets serious / you collaborate with others.
#   install once:  `uvx pre-commit install`  (faster alt: `prek install`, reads the same config)
#   then runs on every git commit; run on everything manually: `uvx pre-commit run --all-files`
#   bump hook versions periodically: `uvx pre-commit autoupdate`

repos:
  # Basic hygiene
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml            # also validates pyproject.toml
      - id: check-added-large-files

  # Ruff: lint --fix first, then format (order matters — --fix edits code)
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.20                 # pin to the ruff version uv installed (`uv run ruff --version`) to avoid drift
    hooks:
      - id: ruff-check
        args: [--fix]             # also sorts imports (rule I)
      - id: ruff-format

  # mypy: run via the local uv env so it sees project deps; checks the whole project, not per-file
  - repo: local
    hooks:
      - id: mypy
        name: mypy
        entry: uv run mypy .
        language: system
        types: [python]
        pass_filenames: false

  # Optional: run tests before commit. Slows every commit; usually better in CI.
  # - repo: local
  #   hooks:
  #     - id: pytest
  #       name: pytest
  #       entry: uv run pytest
  #       language: system
  #       types: [python]
  #       pass_filenames: false
